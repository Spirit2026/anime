<main>
	<section id="contact">
	<h2>Contact</h2>
	<form action="#" method="post" class="contact-form">
		<!-- Row 1: Names -->
		<div class="form-row">
			<label for="full-name">Full Name</label>
			<input type="text" id="full-name" name="full-name" placeholder="Enter your First and Last name" required>
		</div>
		<!-- Row 2: Contact Info -->
		<div class="form-row">
			<div class="form-group">
				<label for="phone">Phone Number:</label>
				<input type="tel" id="phone" name="phone" placeholder="Enter your Phone number" pattern="[0-9]+" title="Please enter numbers only" required>
			</div>
			<div class="form-group">
				<label for="email">Email Address:</label>
				<input type="email" id="email" name="email" placeholder="Enter your Email" required>
			</div>
		</div>
			<!-- In Row 3: Feedback -->
		<div class="form-group">
			<label for="feedback">Feedback:</label>
			<!-- Increased rows to 10 -->
			<textarea id="feedback" name="feedback" rows="10"></textarea>
		</div>
			<input type="submit" value="Submit Feedback" class="submit-btn">
		</form>
	</section>
